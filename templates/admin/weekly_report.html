<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weekly Report | Admin Panel</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body { background: #f8f9fa; }
        .card { border-radius: 16px; }
        .chart-container { height: 400px; }
    </style>
</head>

<body>

<div class="container py-4">

    <!-- Title -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h2>Weekly Overview</h2>
            <small class="text-muted">Last 7 days</small>
        </div>

        <!-- Buttons -->
        <div class="btn-group btn-group-sm">
            <a href="#" class="btn btn-outline-secondary">Today</a>
            <a href="{{ url_for('weekly_report') }}" class="btn btn-outline-secondary active">Week</a>
            <a href="{{ url_for('dashboard') }}" class="btn btn-outline-secondary">Month</a>
        </div>
    </div>

    <!-- Stats -->
    <div class="row g-4 mb-4">
        <div class="col-md-4">
            <div class="card bg-primary text-white p-3 shadow">
                <h6>Total Requests</h6>
                <h3>{{ total }}</h3>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card bg-warning text-dark p-3 shadow">
                <h6>Pending</h6>
                <h3>{{ pending }}</h3>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card bg-success text-white p-3 shadow">
                <h6>Completed</h6>
                <h3>{{ completed }}</h3>
            </div>
        </div>
    </div>

    <!-- Chart -->
    <div class="card shadow p-4">
        <h5>Weekly Request Trends</h5>
        <small class="text-muted">Requests from last 7 days</small>

        <div class="chart-container mt-3">
            <canvas id="weeklyChart"></canvas>
        </div>
    </div>

</div>

<script>
const ctx = document.getElementById('weeklyChart');

new Chart(ctx, {
    type: 'bar',
    data: {
        labels: ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'],
        datasets: [
            {
                label: 'Total',
                data: [12, 19, 8, 15, 10, 6, 9],
                backgroundColor: 'rgba(13,110,253,0.6)'
            },
            {
                label: 'Completed',
                data: [8, 10, 5, 9, 6, 4, 7],
                backgroundColor: 'rgba(25,135,84,0.6)'
            },
            {
                label: 'Pending',
                data: [4, 9, 3, 6, 4, 2, 2],
                backgroundColor: 'rgba(255,193,7,0.6)'
            }
        ]
    },
    options: {
        responsive: true,
        maintainAspectRatio: false
    }
});
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
