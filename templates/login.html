<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" 
          integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" 
          crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        .login-logo-container {
            text-align: center;
        }
        .login-logo {
           height: 60px;
        }
        .brand-logo i {
            font-size: 2.8rem;
            color: #0d6efd;
        }
        .card-header {
            text-align: center;
            padding: 1.5rem 1rem;
        }
        .forgot-link {
            font-size: 0.9rem;
        }
    </style>
</head>
<body class="container mt-5">

<div class="login-container mx-auto" style="max-width: 420px;">

    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
                    {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>
            {% endfor %}
        {% endif %}
    {% endwith %}

    <div class="card shadow-sm">

        <div class="card-header bg-white border-0">
            <div class="login-logo-container">
                <!-- Replace with your actual logo path -->
                <img src="{{ url_for('static', filename='images/Logo-p.png') }}" 
                     alt="Company Logo" class="login-logo">
            </div>
            <h2 class="mb-0">Sign In</h2>
        </div>

        <div class="card-body px-4 pb-4">
            <form method="POST">
                <div class="mb-4">
                    <label class="form-label fw-medium">Email address</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="far fa-envelope"></i></span>
                        <input class="form-control" type="email" name="email" placeholder="Email" required>
                    </div>
                </div>

                <div class="mb-4">
                    <div class="d-flex justify-content-between align-items-baseline">
                        <label class="form-label fw-medium">Password</label>
                        <a href="#" class="forgot-link text-decoration-none">Forgot password?</a>
                    </div>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fas fa-lock"></i></span>
                        <input class="form-control" type="password" name="password" placeholder="Password" required>
                    </div>
                </div>

                <div class="d-grid mb-4">
                    <button type="submit" class="btn btn-primary btn-lg">Login</button>
                </div>

                
            </form>
        </div>
    </div>
</div>

<!-- Optional: Bootstrap JS for alert dismiss -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
